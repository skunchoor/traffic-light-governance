name: Traffic Light Gatekeeper

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write # Needed for the Bot to comment
  contents: read
  checks: write
  issues: write

jobs:
  # Job 1: Run Automated Tests
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          uv pip install --system pytest junitparser
          if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
      - name: Run Tests & Generate JUnit Report
        run: |
          PYTHONPATH=. uv run pytest tests/ --junitxml=test-results.xml || true
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  # Job 2: Multi-Tool Security Scans (SAST / SCA / Secrets)
  security-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Security Scanners
        run: |
          uv pip install --system bandit safety pip-audit
      - name: Run Bandit (Python AST SAST)
        run: |
          uv run bandit -r api/ src/ -f json -o bandit.json || true
      - name: Run Safety (CVE Dependency Scan)
        run: |
          uv run safety check --json --output safety.json || true
      - name: Run pip-audit (PyPI Advisory Audit)
        run: |
          uv run pip-audit -r requirements.txt -f json -o pip-audit.json || true
      - name: Run Semgrep (SAST Engine)
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: false
        env:
          SEMGREP_RULES: p/python p/security-audit
        continue-on-error: true
      - name: Generate Fallback JSON Reports if missing
        run: |
          if [ ! -f bandit.json ]; then echo '{"results":[]}' > bandit.json; fi
          if [ ! -f safety.json ]; then echo '{"vulnerabilities":[]}' > safety.json; fi
          if [ ! -f pip-audit.json ]; then echo '{"dependencies":[]}' > pip-audit.json; fi
          if [ ! -f semgrep.json ]; then echo '{"results":[]}' > semgrep.json; fi
          if [ ! -f snyk.json ]; then echo '{"vulnerabilities":[]}' > snyk.json; fi
          if [ ! -f trivy.json ]; then echo '{"Results":[]}' > trivy.json; fi
          if [ ! -f gitleaks.json ]; then echo '[]' > gitleaks.json; fi
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: '*.json'
          retention-days: 7

  # Job 3: The Traffic Light Gatekeeper Bot & Telemetry Ingest
  gatekeeper-bot:
    needs: [run-tests, security-scans]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Test Report
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: .

      - name: Download Security Reports
        uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: .

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bot Dependencies
        run: uv pip install --system PyGithub junitparser requests

      - name: Run Gatekeeper Evaluation & Notify Dashboard
        id: gatekeeper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL || 'https://traffic-light-backend.vercel.app' }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY || 'dev-secret-api-key-12345' }}
        run: uv run --with junitparser --with PyGithub --with requests python .github/scripts/gatekeeper.py